// ==========================

const TOTAL_QUESTIONS = 20;
const EXAM_TIME = 600;

// ==========================
// 🔧 FUNCTION
// ==========================

}function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function generateBetterOptions(bank){
  return bank.map((q, i) => {
    let wrongPool = bank
      .filter((_, idx) => idx !== i)
      .map(item => item.c);

    wrongPool = shuffle(wrongPool).slice(0,3);

    return {
      q: q.q,
      c: q.c,
      options: shuffle([q.c, ...wrongPool])
    };
  });
}

// ==========================
// 🎯 QUIZ ҮҮСГЭХ
// ==========================

let quiz = [];

function generateQuiz(){

  // 1. сайжруулсан асуултууд үүсгэнэ
  let improvedBank = generateBetterOptions(bank);

  // 2. random 20 асуулт сонгоно
  quiz = shuffle([...improvedBank])
    .slice(0, TOTAL_QUESTIONS)
    .map(q => ({
      question: q.q,
      answers: q.options,
      correct: q.c
    }));
}


// ==========================
// 🧠 STATE
// ==========================

let current = 0;
let score = 0;
let answered = false;

// ==========================
// ⏱ TIMER
// ==========================

let timeLeft = EXAM_TIME;

function startTimer(){
    let timer = setInterval(() => {

        timeLeft--;

        let min = Math.floor(timeLeft / 60);
        let sec = timeLeft % 60;

        document.getElementById("timer").innerText =
            `${min}:${sec < 10 ? "0"+sec : sec}`;

        if(timeLeft <= 0){
            clearInterval(timer);
            finishExam();
        }

    }, 1000);
}

// ==========================
// UI
// ==========================

function loadQuestion(){
    answered = false;

    let q = quiz[current];

    document.getElementById("question").innerText =
        `${current + 1}. ${q.question}`;

    let html = "";

    q.answers.forEach(ans => {
        html += `<button onclick="selectAnswer('${ans}', this)">${ans}</button>`;
    });

    document.getElementById("answers").innerHTML = html;
}

function selectAnswer(ans, btn){
    if(answered) return;

    answered = true;

    if(ans === quiz[current].correct){
        btn.style.background = "lightgreen";
        score++;
    } else {
        btn.style.background = "salmon";
    }
}

function nextQuestion(){
    if(!answered){
        alert("Хариултаа сонгоно уу!");
        return;
    }

    current++;

    if(current < quiz.length){
        loadQuestion();
    } else {
        finishExam();
    }
}

function finishExam(){
    document.getElementById("question").innerText = "🎉 Дууслаа!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("result").innerText =
        `Оноо: ${score} / ${quiz.length}`;
}

// ==========================
// 🚀 START
// ==========================

generateQuiz();
loadQuestion();
startTimer();

</script>
